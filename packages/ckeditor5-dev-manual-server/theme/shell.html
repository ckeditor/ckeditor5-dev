<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="data:image/png;base64,iVBORw0KGgo=">
	<title></title>
	<script type="module" data-manual-shell-script></script>
	<script type="module" data-manual-test-script></script>
</head>
<body>
	<template id="manual-shell-template">
		<div class="shell">
			<a class="shell__pill" href="/" title="Back to test index">&larr; All tests</a>
			<span class="shell__divider" aria-hidden="true"></span>
			<span class="shell__label">
				<span class="shell__label-name" data-manual-shell-field="displayName"></span>
				<span class="shell__label-package" data-manual-shell-field="packageName"></span>
			</span>
			<span class="shell__divider" data-manual-shell-section="instructions" aria-hidden="true"></span>
			<button type="button" class="shell__pill" data-manual-shell-section="instructions" data-shell-action="show-instructions" aria-expanded="false">
				Instructions
			</button>
		</div>

		<aside class="shell-instructions" data-manual-shell-section="instructions" aria-hidden="true" inert>
			<div class="shell-instructions__inner">
				<header class="shell-instructions__header">
					<div class="shell-instructions__titles">
						<h1 class="shell-instructions__title" data-manual-shell-field="displayName"></h1>
						<code class="shell-instructions__package" data-manual-shell-field="packageName"></code>
					</div>
					<button type="button" class="shell-instructions__close" data-shell-action="close-instructions" aria-label="Close">
						<svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
							<path fill="currentColor" d="M3.72 3.72a.75.75 0 011.06 0L8 6.94l3.22-3.22a.75.75 0 111.06 1.06L9.06 8l3.22 3.22a.75.75 0 11-1.06 1.06L8 9.06l-3.22 3.22a.75.75 0 01-1.06-1.06L6.94 8 3.72 4.78a.75.75 0 010-1.06z"/>
						</svg>
					</button>
				</header>
				<article class="shell-instructions__body"></article>
			</div>
		</aside>
	</template>

	<script id="manual-shell-data" type="application/json"></script>
</body>
</html>
