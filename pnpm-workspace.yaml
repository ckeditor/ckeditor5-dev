packages:
  - packages/*

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - puppeteer
  - snyk

overrides:
  'basic-ftp@^5': '^5.3.1'
  'brace-expansion@^5': '^5.0.6'
  'diff@^7': '^8.0.3'
  'fast-uri@^3': '^3.1.2'
  'ip-address@^10': '^10.1.1'
  'lodash@^4': '^4.18.0'
  'minimatch@^9': '^9.0.7'
  'qs@^6': '^6.15.2'
  'serialize-javascript@6': '^7.0.3'
  'uuid@^8': '^14.0.0'
  'ws@^8': '^8.20.1'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

  # Remove after 2026-05-30
  - 'rolldown'
  - '@rolldown/*'
  - '@oxc-project/*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
