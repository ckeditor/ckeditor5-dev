packages:
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  'esbuild': true
  'puppeteer': true
  'snyk': true

overrides:
  'body-parser@^1': '^1.20.6'
  'brace-expansion@^1': '^1.1.16'
  'brace-expansion@^2': '^2.1.2'
  'brace-expansion@^5': '^5.0.7'
  'diff@^7': '^8.0.3'
  'engine.io@^6': '^6.6.7'
  'esbuild@^0.27': '^0.28.1'
  'fast-uri@^3': '^3.1.3'
  'js-yaml@^3': '^4.3.0'
  'js-yaml@^4': '^4.3.0'
  'linkify-it@^5': '^5.0.2'
  'lodash@^4': '^4.18.1'
  'minimatch@^9': '^9.0.7'
  'postcss-selector-parser@^6': '^6.1.3'
  'postcss-selector-parser@^7': '^7.1.2'
  'qs@^6': '^6.15.2'
  'serialize-javascript@^6': '^7.0.5'
  'sigstore@^4': '^4.1.1'
  'tar@^7': '^7.5.19'
  'uuid@^8': '^14.0.0'
  'ws@^8': '^8.21.1'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'
  - 'ws' # Remove after 2026-07-17.

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
verifyDepsBeforeRun: false
