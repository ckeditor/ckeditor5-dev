packages:
  - packages/*

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - puppeteer
  - snyk

overrides:
  'diff@^7': '^8.0.3'
  'fast-uri@^3': '^3.1.2'
  'lodash@^4': '^4.18.0'
  'minimatch@^9': '^9.0.7'
  'qs@^6': '^6.15.2'
  'serialize-javascript@6': '^7.0.3'
  'uuid@^8': '^14.0.0'
  'ws@^8': '^8.20.1'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
