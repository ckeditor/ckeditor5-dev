packages:
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  'esbuild': true
  'puppeteer': true
  'snyk': true

overrides:
  'diff@^7': '^8.0.3'
  'lodash@^4': '^4.18.0'
  'serialize-javascript@6': '^7.0.3'
  'uuid@^8': '^14.0.0'
  'ws@^8': '^8.20.1'
  'js-yaml@^3': '^4.2.0'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
